name: Build MicrodroidDemoApp (android16-release)

on:
  workflow_dispatch:
    inputs:
      android_branch:
        description: Android branch/tag to build from
        required: true
        default: android-latest-release
      runner_label:
        description: Runner labels JSON (allowlisted)
        type: choice
        required: true
        default: '["ubuntu-24.04"]'
        options:
          - '["ubuntu-24.04"]'
          - '["self-hosted","linux","x64","large"]'
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-microdroid-demoapp.yml"

jobs:
  build:
    runs-on: ${{ fromJSON(github.event.inputs.runner_label || '["ubuntu-24.04"]') }}
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      WORKDIR: ${{ github.workspace }}/aosp
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3
        if: ${{ runner.environment == 'github-hosted' }}
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: rmz
          rmz_version: "3.1.1"
          testing: false

      - name: Free disk space on GitHub-hosted runners
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
            libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3

      - name: Install repo tool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/bin/repo"
          chmod +x "$GITHUB_WORKSPACE/bin/repo"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Prepare AOSP workspace
        run: mkdir -p "${WORKDIR}"

      - name: Sync AOSP sources
        working-directory: ${{ env.WORKDIR }}
        env:
          ANDROID_BRANCH: ${{ github.event.inputs.android_branch || 'android-latest-release' }}
        run: |
          set -euxo pipefail
          repo init -u https://android.googlesource.com/platform/manifest -b "${ANDROID_BRANCH}" --depth=1 --partial-clone --clone-filter=blob:none
          repo sync -c -j"$(nproc)" --fail-fast
          
      - name: Build MicrodroidDemoApp
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euxo pipefail
          export TOP="$PWD"
          export ANDROID_GLOBAL_BUILD_PATHS="${ANDROID_GLOBAL_BUILD_PATHS:-}"
          set +u
          source build/envsetup.sh
          set -u
          lunch aosp_cf_x86_64_phone-trunk_staging-userdebug
          UNBUNDLED_BUILD_SDKS_FROM_SOURCE=true TARGET_BUILD_APPS=MicrodroidDemoApp m -j"$(nproc)" apps_only dist
    
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicrodroidDemoApp-apk
          path: |
            ${{ env.WORKDIR }}/out/dist/MicrodroidDemoApp.apk
            ${{ env.WORKDIR }}/out/dist/*Microdroid*.apk
          if-no-files-found: warn
